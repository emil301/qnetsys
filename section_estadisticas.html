<!-- ============================================================
     SECCIÓN: ESTADÍSTICAS / RESULTADOS
     Para editar: cambiar data-target en cada .counter-value
     y el label debajo de cada contador.
     Los contadores se animan por JS (scripts.js, función initCounters).
     ============================================================ -->
<section id="estadisticas" class="py-24 relative overflow-hidden">

    <!-- Fondo con grid y glow -->
    <div class="absolute inset-0 grid-bg opacity-30"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-indigo-500/5 to-transparent pointer-events-none"></div>

    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- Header -->
        <div class="text-center mb-16 scroll-reveal">
            <span class="inline-block px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-semibold uppercase tracking-widest mb-4">Resultados</span>
            <h2 class="font-tech text-3xl md:text-4xl font-bold text-white mb-4">
                Números que <span class="gradient-text">respaldan</span> nuestra propuesta
            </h2>
        </div>

        <!-- Grilla de contadores -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-px bg-white/5 rounded-2xl overflow-hidden">

            <div class="bg-qnet-primary p-10 flex flex-col items-center justify-center text-center scroll-reveal group hover:bg-qnet-surface transition-colors">
                <div class="font-tech text-5xl md:text-6xl font-bold text-white counter-value mb-2" data-target="500" data-suffix="+">0</div>
                <div class="text-sm text-gray-400 leading-tight">Clientes<br>protegidos</div>
                <div class="mt-4 w-8 h-0.5 bg-cyan-500/50 group-hover:w-16 transition-all duration-500"></div>
            </div>

            <div class="bg-qnet-primary p-10 flex flex-col items-center justify-center text-center scroll-reveal group hover:bg-qnet-surface transition-colors" style="transition-delay:100ms">
                <div class="font-tech text-5xl md:text-6xl font-bold text-white counter-value mb-2" data-target="10000" data-suffix="+">0</div>
                <div class="text-sm text-gray-400 leading-tight">Dispositivos<br>conectados</div>
                <div class="mt-4 w-8 h-0.5 bg-indigo-500/50 group-hover:w-16 transition-all duration-500"></div>
            </div>

            <div class="bg-qnet-primary p-10 flex flex-col items-center justify-center text-center scroll-reveal group hover:bg-qnet-surface transition-colors" style="transition-delay:200ms">
                <div class="font-tech text-5xl md:text-6xl font-bold text-white counter-value mb-2" data-target="99" data-suffix="%">0</div>
                <div class="text-sm text-gray-400 leading-tight">Uptime<br>garantizado</div>
                <div class="mt-4 w-8 h-0.5 bg-cyan-500/50 group-hover:w-16 transition-all duration-500"></div>
            </div>

            <div class="bg-qnet-primary p-10 flex flex-col items-center justify-center text-center scroll-reveal group hover:bg-qnet-surface transition-colors" style="transition-delay:300ms">
                <div class="font-tech text-5xl md:text-6xl font-bold text-white counter-value mb-2" data-target="8" data-suffix=" años">0</div>
                <div class="text-sm text-gray-400 leading-tight">De experiencia<br>en el mercado</div>
                <div class="mt-4 w-8 h-0.5 bg-indigo-500/50 group-hover:w-16 transition-all duration-500"></div>
            </div>

        </div><!-- /grid contadores -->

        <!-- Testimonios / badges de confianza -->
        <div class="mt-16 flex flex-col md:flex-row items-center justify-center gap-6 scroll-reveal">

            <div class="flex items-center gap-3 glass-card rounded-full px-6 py-3">
                <svg class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
                <span class="text-white text-sm font-medium">4.9 / 5 en satisfacción de clientes</span>
            </div>

            <div class="flex items-center gap-3 glass-card rounded-full px-6 py-3">
                <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                <span class="text-white text-sm font-medium">Garantía de 2 años en instalaciones</span>
            </div>

            <div class="flex items-center gap-3 glass-card rounded-full px-6 py-3">
                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                <span class="text-white text-sm font-medium">Equipo técnico certificado</span>
            </div>

        </div>

    </div>
</section>
